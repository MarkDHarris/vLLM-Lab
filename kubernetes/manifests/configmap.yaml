apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: vllm-learning-lab
data:
  MODEL_NAME: "Qwen/Qwen2.5-1.5B-Instruct"
  MAX_MODEL_LEN: "2048"
  GPU_MEMORY_UTILIZATION: "0.35"
  VLLM_ARGS: "--host 0.0.0.0 --port 8000 --dtype float16 --max-model-len 2048 --gpu-memory-utilization 0.35 --enforce-eager"
